FEATURES {
    STARTADDRESS: default = $0a00;
}
SYMBOLS {
    __LOADADDR__: type = import;
}
MEMORY {
    ZP:
        file = "", define = yes,
        start = $0002,
        size = $00FE;
    LOADADDR:
        file = %O,
        start = %S - 2,
        size = $0002;
    MAIN:
        file = %O, define = yes,
        start = %S,
        size = $10000-%S;
}
SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    MAIN: load = MAIN, type = rw;
}
